<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test foto</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f7f3ef; }
  h2 { color: #b07d62; }
  .box { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #e8ddd5; }
  label.foto-btn {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100px; height: 100px; border: 2px dashed #b07d62; border-radius: 12px;
    cursor: pointer; color: #b07d62; font-size: 0.8rem; gap: 6px;
  }
  label.foto-btn input { display: none; }
  label.foto-btn span.ico { font-size: 2rem; }
  #fotky { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  #fotky img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; border: 1px solid #e8ddd5; }
  #log { font-size: 0.8rem; color: #888; margin-top: 10px; white-space: pre-wrap; }
  .green { color: green; font-weight: bold; }
  .red { color: red; font-weight: bold; }
</style>
</head>
<body>

<h2>🐘 Test vkládání fotek</h2>

<div class="box">
  <b>Test 1 — přímý input</b><br><br>
  <input type="file" accept="image/*" onchange="test1(this)" />
  <div id="r1"></div>
</div>

<div class="box">
  <b>Test 2 — label wrapper</b><br><br>
  <label class="foto-btn">
    <span class="ico">📸</span>
    <span>Přidat foto</span>
    <input type="file" accept="image/*" onchange="test2(this)" />
  </label>
  <div id="r2"></div>
</div>

<div class="box">
  <b>Test 3 — IndexedDB uložení</b><br><br>
  <label class="foto-btn">
    <span class="ico">💾</span>
    <span>Foto + uložit</span>
    <input type="file" accept="image/*" onchange="test3(this)" />
  </label>
  <button onclick="loadFromDB()" style="margin-left:10px;padding:8px 14px;border-radius:8px;border:1px solid #b07d62;background:#b07d62;color:#fff;cursor:pointer">Načíst z DB</button>
  <div id="r3"></div>
  <div id="fotky"></div>
</div>

<div id="log">📋 Log:\n</div>

<script>
function log(msg, ok) {
  var el = document.getElementById('log');
  var cls = ok === true ? 'green' : ok === false ? 'red' : '';
  el.innerHTML += '<span class="' + cls + '">' + msg + '</span>\n';
}

// TEST 1 - přímý input
function test1(inp) {
  var f = inp.files[0];
  if (!f) { log('Test1: žádný soubor', false); return; }
  log('Test1: soubor vybrán — ' + f.name + ' (' + Math.round(f.size/1024) + ' KB)', true);
  var reader = new FileReader();
  reader.onload = function(e) {
    log('Test1: FileReader OK', true);
    var img = document.createElement('img');
    img.src = e.target.result;
    img.style.cssText = 'max-width:150px;margin-top:8px;display:block;border-radius:8px';
    document.getElementById('r1').appendChild(img);
  };
  reader.onerror = function(e) { log('Test1: FileReader CHYBA — ' + e, false); };
  reader.readAsDataURL(f);
}

// TEST 2 - label wrapper
function test2(inp) {
  var f = inp.files[0];
  if (!f) { log('Test2: žádný soubor', false); return; }
  log('Test2: soubor vybrán — ' + f.name, true);
  var reader = new FileReader();
  reader.onload = function(e) {
    log('Test2: FileReader OK', true);
    var img = document.createElement('img');
    img.src = e.target.result;
    img.style.cssText = 'max-width:150px;margin-top:8px;display:block;border-radius:8px';
    document.getElementById('r2').appendChild(img);
  };
  reader.onerror = function(e) { log('Test2: FileReader CHYBA — ' + e, false); };
  reader.readAsDataURL(f);
}

// TEST 3 - IndexedDB
var dbInstance = null;

function openDB() {
  return new Promise(function(resolve, reject) {
    if (dbInstance) { resolve(dbInstance); return; }
    var req = indexedDB.open('testFotoDB', 1);
    req.onupgradeneeded = function(e) {
      log('DB: vytváří se store...', true);
      e.target.result.createObjectStore('photos', { keyPath: 'id' });
    };
    req.onsuccess = function(e) {
      dbInstance = e.target.result;
      log('DB: otevřena úspěšně', true);
      resolve(dbInstance);
    };
    req.onerror = function(e) {
      log('DB: CHYBA otevření — ' + JSON.stringify(e.target.error), false);
      reject(e);
    };
  });
}

function test3(inp) {
  var f = inp.files[0];
  if (!f) { log('Test3: žádný soubor', false); return; }
  log('Test3: soubor vybrán — ' + f.name, true);

  var reader = new FileReader();
  reader.onload = function(e) {
    log('Test3: FileReader OK, zmenšuji...', true);
    var img = new Image();
    img.onload = function() {
      var MAX = 800;
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      log('Test3: zmenšeno na ' + w + 'x' + h + ', ukládám do DB...', true);

      openDB().then(function(db) {
        var tx = db.transaction('photos', 'readwrite');
        tx.objectStore('photos').put({ id: 'test_foto', data: dataUrl });
        tx.oncomplete = function() { log('Test3: uloženo do IndexedDB ✅', true); inp.value = ''; };
        tx.onerror = function(e) { log('Test3: CHYBA uložení — ' + JSON.stringify(e.target.error), false); };
      }).catch(function(e) { log('Test3: CHYBA DB — ' + e, false); });
    };
    img.onerror = function() { log('Test3: CHYBA načtení obrázku', false); };
    img.src = e.target.result;
  };
  reader.onerror = function(e) { log('Test3: FileReader CHYBA', false); };
  reader.readAsDataURL(f);
}

function loadFromDB() {
  openDB().then(function(db) {
    var tx = db.transaction('photos', 'readonly');
    var req = tx.objectStore('photos').get('test_foto');
    req.onsuccess = function() {
      if (!req.result) { log('Načíst: nic v DB nenalezeno', false); return; }
      log('Načíst: fotka nalezena v DB ✅', true);
      var fotky = document.getElementById('fotky');
      fotky.innerHTML = '';
      var img = document.createElement('img');
      img.src = req.result.data;
      fotky.appendChild(img);
    };
    req.onerror = function() { log('Načíst: CHYBA čtení z DB', false); };
  });
}

log('Stránka načtena, testuj! 🚀');
</script>
</body>
</html>
